{% extends 'base.html' %}

{% block title %}Course List{% endblock %}

{% block content %}
<h2>Available Courses</h2>

<table border="1">
    <thead>
        <tr>
            <th>Code</th>
            <th>Name</th>
            <th>Department</th>
        </tr>
    </thead>

    <tbody>
        {% for course in courses %}
        <tr>
            <td>{{ course.code }}</td>
            <td>{{ course.name }}</td>
            <td>{{ course.department.name }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
